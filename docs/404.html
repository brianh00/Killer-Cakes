<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Single Page Apps for GitHub Pages</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new url with only a query string and hash fragment,
      // e.g., http://www.foo.tld/one/two?a=b&c=d#qwe, becomes
      // http://www.foo.tld/?/one/two&a=b~and~c=d#qwe
      // Note: this 404.html file must be at least 512 bytes for it to work
      // with Internet Explorer (it is currently > 512 bytes)

      // If you're using a custom domain, set the basePath to the path to the
      // repository on your domain, e.g., '/blog' for https://www.example.com/blog
      var basePath = '/Killer-Cakes';
      var redirect = basePath + '/?';

      // redirect hash
      if (window.location.hash) {
        redirect += window.location.hash.substring(1);
      }

      // redirect search query, but replace & with ~and~
      if (window.location.search) {
        redirect += window.location.search.substring(1).replace(/&/g, '~and~');
      }

      // redirect path, but replace / with ~
      var path = window.location.pathname;
      if (path.indexOf(basePath) === 0) {
        path = path.substring(basePath.length);
      }
      if (path) {
        redirect += path.replace(/\//g, '~');
      }

      // redirect to index.html with query string
      window.location.replace(redirect);
    </script>
  </head>
  <body>
  </body>
</html>
